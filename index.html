<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Aplicación web To-Do List con persistencia local y filtros">
  <meta name="author" content="Gibrán Guzmán">
  <meta name="version" content="1.0.0">
  <title>To-Do List</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>To-Do List</h1>
    <p>Gestiona tus tareas de forma simple y eficiente</p>
  </header>

  <main>
    <section aria-label="Agregar nueva tarea">
      <form id="todo-form" novalidate>
        <label for="todo-input" class="sr-only">Nueva tarea</label>
        <input type="text" id="todo-input" placeholder="Escribe una nueva tarea..." maxlength="200" autocomplete="off">
        <button type="submit" id="todo-submit">Agregar</button>
      </form>
      <p id="error-message" class="error-message" role="alert" aria-live="polite"></p>
    </section>

    <section aria-label="Filtros">
      <h2 class="sr-only">Filtros de tareas</h2>
      <div class="filters" role="group" aria-label="Filtros de estado">
        <button type="button" class="filter-btn active" data-filter="all">Todas</button>
        <button type="button" class="filter-btn" data-filter="pending">Pendientes</button>
        <button type="button" class="filter-btn" data-filter="completed">Completadas</button>
      </div>
    </section>

    <section aria-label="Lista de tareas">
      <h2 class="sr-only">Tareas</h2>
      <ul id="todo-list" aria-live="polite">
        <!-- Las tareas se renderizan aquí dinámicamente -->
      </ul>
    </section>

    <section aria-label="Resumen">
      <p id="todo-count" class="todo-count">0 tareas pendientes</p>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Gibrán Guzmán — v1.0.0</p>
  </footer>

  <script src="js/todo.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
